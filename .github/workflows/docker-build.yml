name: Build Docker Images

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read        

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: demo
    outputs:
      version: ${{ steps.version.outputs.version }}
    strategy:
      matrix:
        include:
          - dockerfile: Dockerfile.worker
            image_name: docwriter-worker-job
          - dockerfile: plantuml-server/Dockerfile
            image_name: plantuml-server

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for tags

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Determine version
        id: version
        run: |
          VERSION=$(git describe --tags --long --dirty | tr -d '\n')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.SPN_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.subscription_id }}     

      - name: Authenticate to ACR
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build and push ${{ matrix.image_name }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ matrix.image_name }}:latest
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ matrix.image_name }}:${{ steps.version.outputs.version }}

  api:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: demo
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.SPN_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.subscription_id }}     

      - name: Authenticate to ACR
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.api
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/docwriter-api:latest
            ${{ secrets.ACR_LOGIN_SERVER }}/docwriter-api:${{ needs.build.outputs.version }}

  ui:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: demo
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.SPN_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.subscription_id }}     

      - name: Authenticate to ACR
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build and push UI image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ui/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=https://aidocwriter-api.gentlecliff-6769fc4f.westeurope.azurecontainerapps.io
            NEXT_PUBLIC_AUTH0_AUDIENCE=https://docwriter-api.azureway.cloud
            NEXT_PUBLIC_AUTH0_SCOPE=openid profile email api offline_access
            NEXT_PUBLIC_PROFILE_ROUTE=/auth/profile
            NEXT_PUBLIC_ACCESS_TOKEN_ROUTE=/api/auth/access-token
            NEXT_PUBLIC_REVIEW_STYLE_ENABLED=false
            NEXT_PUBLIC_REVIEW_COHESION_ENABLED=false
            NEXT_PUBLIC_REVIEW_SUMMARY_ENABLED=false
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/docwriter-ui:latest
            ${{ secrets.ACR_LOGIN_SERVER }}/docwriter-ui:${{ needs.build.outputs.version }}

  terraform:
    needs: [build, api, ui]
    uses: ./.github/workflows/terraform.yml
    with:
      docker_image_version: ${{ needs.build.outputs.version }}
    secrets: inherit
